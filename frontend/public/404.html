<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyTranslationBuddy</title>
  <script>
    // GitHub Pages SPA redirect — converts /path to /#/path
    var path = window.location.pathname.replace('/MyTranslationBuddy', '');
    var search = window.location.search;
    if (path && path !== '/' && path !== '/index.html') {
      window.location.replace(
        window.location.origin + '/MyTranslationBuddy/#' + path + search
      );
    } else {
      window.location.replace(window.location.origin + '/MyTranslationBuddy/');
    }
  </script>
</head>
<body></body>
</html>
